name: Notify stinb/sti of changes

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-sync]')"
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SYNC_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'stinb',
              repo: 'sti',
              event_type: 'sync-plugins-to-sti',
              client_payload: { sha: context.sha }
            });
